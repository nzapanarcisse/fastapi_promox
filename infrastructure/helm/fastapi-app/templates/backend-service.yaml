###############################################################################
# Service Backend - Expose le backend FastAPI en interne
###############################################################################
apiVersion: v1
kind: Service
metadata:
  name: fastapi-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.backendLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: fastapi-backend

