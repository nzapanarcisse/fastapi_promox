###############################################################################
# Deployment Backend - FastAPI application
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.backendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-backend
        app.kubernetes.io/component: backend
    spec:
      initContainers:
        - name: wait-for-db
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z {{ .Values.backend.env.POSTGRES_SERVER }} {{ .Values.backend.env.POSTGRES_PORT }}; do echo "Waiting for PostgreSQL..."; sleep 3; done']
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: fastapi-backend-config
            - secretRef:
                name: fastapi-app-secrets
          livenessProbe:
            httpGet:
              path: /api/v1/utils/health-check/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/utils/health-check/
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      restartPolicy: Always

