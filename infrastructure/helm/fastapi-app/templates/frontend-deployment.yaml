###############################################################################
# Deployment Frontend - React/Vite servi par Nginx
###############################################################################
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fastapi-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fastapi-app.frontendLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: fastapi-frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: fastapi-frontend
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      restartPolicy: Always

