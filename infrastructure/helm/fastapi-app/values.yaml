###############################################################################
# Helm Values - Application FastAPI Full-Stack
###############################################################################

# ---- Global ----
global:
  domain: "example.com"
  environment: "production"

# ---- Images Docker ----
backend:
  image:
    repository: "registry.example.com/fastapi-backend"
    tag: "latest"
    pullPolicy: Always
  replicaCount: 2
  port: 8000
  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"
  env:
    DOMAIN: "example.com"
    ENVIRONMENT: "production"
    BACKEND_CORS_ORIGINS: "https://dashboard.example.com"
    FRONTEND_HOST: "https://dashboard.example.com"
    PROJECT_NAME: "FastAPI App"
    POSTGRES_SERVER: "fastapi-app-postgresql"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "app"
    POSTGRES_USER: "app"
    SMTP_HOST: ""
    SMTP_PORT: "587"
    SMTP_USER: ""
    SMTP_PASSWORD: ""
    EMAILS_FROM_EMAIL: ""
    SENTRY_DSN: ""
  secrets:
    POSTGRES_PASSWORD: "changethis"
    SECRET_KEY: "changethis-secret-key"
    FIRST_SUPERUSER: "admin@example.com"
    FIRST_SUPERUSER_PASSWORD: "changethis"

frontend:
  image:
    repository: "registry.example.com/fastapi-frontend"
    tag: "latest"
    pullPolicy: Always
  replicaCount: 2
  port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"
  env:
    VITE_API_URL: "https://api.example.com"

# ---- PostgreSQL (Bitnami subchart) ----
postgresql:
  enabled: true
  auth:
    username: "app"
    password: "changethis"
    database: "app"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      requests:
        cpu: "250m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# ---- Adminer (DB Admin UI) ----
adminer:
  enabled: true
  replicaCount: 1
  port: 8080
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ---- Ingress ----
ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  tls:
    enabled: true

# ---- Prestart Job (DB migrations) ----
prestart:
  enabled: true

